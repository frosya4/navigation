<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Исторический Минск - Маршрут</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="map"></div>
    <div class="map-vignette"></div>

    <!-- Map Hint: shown when no location is selected -->
    <div class="map-hint" id="map-hint">
        <i class="fas fa-hand-pointer"></i>
        <span>Нажмите на точку маршрута</span>
    </div>

    <!-- Sidebar / Panel for details -->
    <aside id="sidebar" class="sidebar hidden">
        <button id="close-btn" class="close-btn"><i class="fas fa-times"></i></button>
        <div class="sidebar-content">
            <div class="sidebar-header">
                <span class="step-badge" id="place-step">1 / 15</span>
                <h2 id="place-title" class="historical-font">Название места</h2>
            </div>

            <!-- Progress bar -->
            <div class="progress-bar-container">
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                </div>
                <span class="progress-label" id="progress-label">Остановка 1 из 15</span>
            </div>

            <div class="image-container">
                <img id="place-image" src="" alt="Historical location"
                    style="display: none; width: 100%; height: 100%; object-fit: cover;">
                <div id="place-image-placeholder" class="image-placeholder">
                    <i class="fas fa-landmark"></i>
                </div>
                <div class="image-overlay"></div>
            </div>

            <div class="description-container">
                <p id="place-description">Описание исторического места...</p>
            </div>

            <div class="transport-container" id="transport-section">
                <h3><i class="fas fa-route"></i> Как добраться дальше</h3>
                <div class="transport-card">
                    <div class="transport-icon" id="transport-icon">
                        <i class="fas fa-walking"></i>
                    </div>
                    <div class="transport-details">
                        <p id="transport-text">Пешком ~5 мин</p>
                    </div>
                </div>
            </div>
        </div><!-- end .sidebar-content -->

        <!-- Navigation always pinned at the bottom -->
        <div class="sidebar-footer">
            <div class="navigation-controls">
                <button id="prev-btn" class="nav-btn" disabled><i class="fas fa-arrow-left"></i> Назад</button>
                <button id="next-btn" class="nav-btn primary-btn">Вперёд <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>
    </aside>

    <!-- Title Card with Start Button -->
    <div class="title-overlay" id="title-overlay">
        <div class="title-text">
            <h1>Исторический Минск</h1>
            <p>15 остановок · Проспект Независимости</p>
        </div>
        <div class="title-buttons">
            <button class="start-btn" id="start-btn">
                <i class="fas fa-play"></i> Начать маршрут
            </button>
            <button class="reverse-btn" id="reverse-btn" title="Изменить направление (с конца в начало)">
                <i class="fas fa-exchange-alt"></i>
            </button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.4/dist/leaflet.polylineDecorator.js"></script>

    <!-- Custom Scripts -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
